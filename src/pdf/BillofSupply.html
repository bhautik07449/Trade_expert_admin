<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, print-scale: 100%">
    <title>Smart Invoice Generator | Fill & Print PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
        }

        /* Main form container - screen only */
        .form-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* PRINT STYLES — everything becomes clean invoice layout */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .form-container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                margin: 0;
                background: white;
            }

            .no-print,
            .print-hide,
            .action-buttons,
            .print\\:hidden {
                display: none !important;
            }

            /* ensure all borders, spacing match invoice style */
            .print-invoice-wrapper {
                padding: 0;
                margin: 0;
            }

            .invoice-print-layout {
                margin: 0;
                padding: 0;
            }

            table,
            th,
            td {
                page-break-inside: avoid;
            }

            body,
            .print-invoice-wrapper,
            .invoice-data-root {
                background: white;
            }
        }

        /* card styling */
        .form-panel {
            padding: 1.75rem;
        }

        /* grid & borders same as original design */
        .border-grid {
            border: 1px solid #cbd5e1;
        }

        .bg-soft {
            background-color: #f8fafc;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .field-label {
            width: 110px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #1e293b;
        }

        input,
        textarea {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            background: white;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .invoice-table th,
        .invoice-table td {
            border: 1px solid #94a3b8;
            padding: 6px 4px;
            vertical-align: top;
        }

        .invoice-table th {
            background: #f1f5f9;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
        }

        .uppercase-title {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .section-title {
            background: #f1f5f9;
            padding: 8px 12px;
            font-weight: 700;
            border-bottom: 1px solid #cbd5e1;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .btn {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
        }

        .btn-primary:hover {
            background: #0f172a;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .inline-field {
            flex: 1;
        }

        @media (max-width: 1024px) {
            .field-label {
                width: 100px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container" id="invoiceApp">
        <div class="form-panel">
            <!-- This hidden area will hold the printable invoice structure -->
            <form id="invoiceForm" onsubmit="event.preventDefault(); handlePrint();">
                <!-- === ORIGINAL FORM LAYOUT (fully functional data entry) === -->
                <div class="border border-gray-300 rounded-md overflow-hidden">
                    <div class="border-b text-center py-3 font-bold uppercase bg-gray-100 text-gray-800 text-base">
                        {{ title || 'TAX INVOICE / BILL OF SUPPLY' }}
                    </div>

                    <!-- 3 column: shipping, billing, invoice -->
                    <div class="grid grid-cols-1 lg:grid-cols-3"
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr));">
                        <div class="border p-3 space-y-2">
                            <div class="uppercase font-bold text-sm">Shipping Details</div>
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="Name" fieldId="shippingName" />
                                <Field label="Address" fieldId="shippingAddress" />
                                <Field label="GSTIN" fieldId="shippingGstin" />
                                <Field label="State" fieldId="shippingState" />
                                <Field label="Code" fieldId="shippingCode" />
                            </div>
                        </div>
                        <div class="border p-3 space-y-2">
                            <div class="uppercase font-bold text-sm">Billing Details</div>
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="Name" fieldId="billingName" />
                                <Field label="Address" fieldId="billingAddress" />
                                <Field label="GSTIN" fieldId="billingGstin" />
                                <Field label="State" fieldId="billingState" />
                                <Field label="Code" fieldId="billingCode" />
                            </div>
                        </div>
                        <div class="border p-3 space-y-2">
                            <div class="uppercase font-bold text-sm">Invoice Details</div>
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="Invoice No" fieldId="invoiceNo" />
                                <Field label="Invoice Date" fieldId="invoiceDate" type="date" />
                                <Field label="State" fieldId="invoiceState" />
                                <Field label="State Code" fieldId="invoiceStateCode" />
                                <Field label="Haste" fieldId="invoiceHaste" />
                                <Field label="Haste Contact" fieldId="invoiceHasteContact" />
                            </div>
                        </div>
                    </div>

                    <!-- Product Table with editable rows (11 columns) -->
                    <div class="border overflow-x-auto">
                        <table class="invoice-table" id="itemsTable">
                            <thead>
                                <tr>
                                    <th>Sr No.</th>
                                    <th>Product Description</th>
                                    <th>HSN Code</th>
                                    <th>UNIT OF MEASURE</th>
                                    <th>Qty</th>
                                    <th>Rate</th>
                                    <th>Amount</th>
                                    <th>IGST</th>
                                    <th>CGST</th>
                                    <th>SGST</th>
                                    <th>Final</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <!-- dynamic rows: 3 rows for better demo but user can add more -->
                            </tbody>
                        </table>
                        <div class="p-2 text-right print-hide">
                            <button type="button" id="addRowBtn" class="btn btn-primary"
                                style="padding: 5px 16px; font-size:12px;">+ Add Product Row</button>
                        </div>
                    </div>

                    <!-- bottom: amount in words + right summary -->
                    <div class="grid grid-cols-1 lg:grid-cols-3"
                        style="display: grid; grid-template-columns: 1fr 1fr 1fr;">
                        <div class="border p-3 space-y-2 col-span-2 bg-gray-50">
                            <div><label class="uppercase font-semibold text-sm">Amount in Words</label>
                                <textarea id="amountInWords" rows="3" class="w-full border rounded p-2"
                                    placeholder="e.g., Rupees One Thousand Only"></textarea>
                            </div>
                            <div><label class="uppercase font-semibold text-sm">PAYMENT TERM</label>
                                <textarea id="paymentTerm" rows="3" class="w-full border rounded p-2"
                                    placeholder="Credit / Net 30 days etc."></textarea>
                            </div>
                        </div>
                        <div class="border p-3 space-y-2 col-span-1">
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="HASTE (COMMITION)" fieldId="hasteCommision" />
                                <Field label="DELIVERY CHARGE" fieldId="deliveryCharge" />
                                <Field label="TOTAL TAX AMOUNT" fieldId="totalTaxAmount" />
                                <Field label="INSURANCE (IF)" fieldId="insuranceIf" />
                                <Field label="TOTAL AMOUNT" fieldId="totalAmountFinal" />
                            </div>
                        </div>
                    </div>

                    <!-- Transport + Bank + Terms -->
                    <div class="grid grid-cols-1 lg:grid-cols-3"
                        style="display: grid; grid-template-columns: repeat(3,1fr);">
                        <div class="border p-3 space-y-2">
                            <div class="uppercase font-bold text-sm">Transport Details</div>
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="NAME" fieldId="transportName" />
                                <Field label="LORRY NO" fieldId="lorryNo" />
                                <Field label="CONTACT NO" fieldId="transportContact" />
                                <Field label="COMPANY" fieldId="transportCompany" />
                            </div>
                        </div>
                        <div class="border p-3 space-y-2">
                            <div class="uppercase font-bold text-sm">BANK DETAILS</div>
                            <div class="bg-gray-50 p-3 space-y-2">
                                <Field label="NAME" fieldId="bankName" value="AXIS BANK LTD." />
                                <Field label="ACC NO." fieldId="bankAccNo" />
                                <Field label="IFSC CODE" fieldId="bankIfsc" />
                                <Field label="BRANCH" fieldId="bankBranch" />
                            </div>
                        </div>
                        <div class="border p-3">
                            <div class="uppercase font-bold text-sm">TERMS</div>
                            <div class="bg-gray-50 p-3 h-full flex flex-col">
                                <span>Subjected to surat jurisdiction</span>
                                <div class="flex-1 min-h-[60px]"></div>
                                <span>Sign & Stamp</span>
                            </div>
                        </div>
                    </div>

                    <!-- action buttons -->
                    <div class="action-buttons no-print">
                        <button type="button" class="btn btn-primary" id="printBtn">🖨️ Print / PDF (Save as
                            PDF)</button>
                        <button type="button" class="btn btn-danger" id="cancelBtn">Cancel / Reset</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- hidden printable template will be generated dynamically -->
    <script>
        // Helper: dynamic field component (render)
        function Field({ label, fieldId, type = "text", value = "" }) {
            // this function is used inside JSX-style but we will generate HTML via JS, but we create input manually in html.
            // Since HTML is static, we'll generate using innerHTML/initialization. But we defined static fields with IDs.
            // to avoid complexity, we manually ensure all field IDs exist.
        }
        // Actually we already wrote HTML with fieldId attributes, so we just need to handle dynamic table rows.

        // Table row management:
        let rowCounter = 1;
        const tbody = document.getElementById('tableBody');

        function createTableRow(srNo = null) {
            const rowCount = tbody.children.length;
            const sr = srNo !== null ? srNo : rowCount + 1;
            const tr = document.createElement('tr');
            tr.className = 'product-row';
            // 11 columns: sr, desc, hsn, uom, qty, rate, amount, igst, cgst, sgst, final
            const cells = [];
            for (let i = 0; i < 11; i++) {
                const td = document.createElement('td');
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'product-input';
                input.style.width = '100%';
                input.style.border = 'none';
                input.style.background = 'transparent';
                input.style.padding = '4px';
                if (i === 0) {
                    input.value = sr;
                    input.readOnly = true;
                    input.style.fontWeight = 'bold';
                    input.style.background = '#f9fafb';
                }
                if (i === 4) input.type = 'number';   // Qty
                if (i === 5) input.type = 'number';   // Rate
                if (i === 6) input.type = 'number';   // Amount
                if (i === 7 || i === 8 || i === 9) input.type = 'number';
                if (i === 10) input.type = 'number';  // Final
                td.appendChild(input);
                tr.appendChild(td);
            }
            // attach event listeners for auto-calc later (optional but not required)
            return tr;
        }

        function refreshSerialNumbers() {
            const rows = tbody.querySelectorAll('tr');
            rows.forEach((row, idx) => {
                const firstInput = row.querySelector('td:first-child input');
                if (firstInput) firstInput.value = idx + 1;
            });
        }

        function addNewRow() {
            const newRow = createTableRow();
            tbody.appendChild(newRow);
            refreshSerialNumbers();
        }

        // initial rows (3 rows as per typical invoice)
        for (let i = 0; i < 3; i++) {
            tbody.appendChild(createTableRow(i + 1));
        }
        document.getElementById('addRowBtn')?.addEventListener('click', addNewRow);

        // reset / cancel button
        document.getElementById('cancelBtn')?.addEventListener('click', () => {
            if (confirm('Reset all form fields and clear product rows?')) {
                // reset all input fields across entire form
                document.querySelectorAll('input, textarea').forEach(field => {
                    if (field.type !== 'button' && field.id !== 'addRowBtn') {
                        if (field.id === 'bankName') field.value = 'AXIS BANK LTD.';
                        else field.value = '';
                    }
                });
                // reset table rows to 3 empty rows
                while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
                for (let i = 0; i < 3; i++) {
                    tbody.appendChild(createTableRow(i + 1));
                }
                refreshSerialNumbers();
                // set default optional
                const dateField = document.getElementById('invoiceDate');
                if (dateField) dateField.value = new Date().toISOString().split('T')[0];
            }
        });

        // set today's date as default
        const today = new Date().toISOString().split('T')[0];
        if (document.getElementById('invoiceDate')) document.getElementById('invoiceDate').value = today;

        // ---------- PRINT LOGIC: Build clean A4 invoice with filled data ----------
        function getProductRowsData() {
            const rows = tbody.querySelectorAll('tr');
            const products = [];
            for (let i = 0; i < rows.length; i++) {
                const inputs = rows[i].querySelectorAll('input');
                if (inputs.length >= 11) {
                    products.push({
                        sr: inputs[0].value,
                        description: inputs[1].value,
                        hsn: inputs[2].value,
                        uom: inputs[3].value,
                        qty: inputs[4].value,
                        rate: inputs[5].value,
                        amount: inputs[6].value,
                        igst: inputs[7].value,
                        cgst: inputs[8].value,
                        sgst: inputs[9].value,
                        final: inputs[10].value
                    });
                }
            }
            return products;
        }

        function getFieldValue(id, defaultValue = '') {
            const el = document.getElementById(id);
            return el ? el.value.trim() || defaultValue : defaultValue;
        }

        function buildPrintHTML() {
            // collect all data
            const shipping = {
                name: getFieldValue('shippingName'), address: getFieldValue('shippingAddress'), gstin: getFieldValue('shippingGstin'),
                state: getFieldValue('shippingState'), code: getFieldValue('shippingCode')
            };
            const billing = {
                name: getFieldValue('billingName'), address: getFieldValue('billingAddress'), gstin: getFieldValue('billingGstin'),
                state: getFieldValue('billingState'), code: getFieldValue('billingCode')
            };
            const invoice = {
                no: getFieldValue('invoiceNo'), date: getFieldValue('invoiceDate'), state: getFieldValue('invoiceState'),
                stateCode: getFieldValue('invoiceStateCode'), haste: getFieldValue('invoiceHaste'), hasteContact: getFieldValue('invoiceHasteContact')
            };
            const transport = {
                name: getFieldValue('transportName'), lorryNo: getFieldValue('lorryNo'), contact: getFieldValue('transportContact'), company: getFieldValue('transportCompany')
            };
            const bank = {
                name: getFieldValue('bankName') || 'AXIS BANK LTD.', accNo: getFieldValue('bankAccNo'), ifsc: getFieldValue('bankIfsc'), branch: getFieldValue('bankBranch')
            };
            const amountWords = getFieldValue('amountInWords');
            const paymentTerm = getFieldValue('paymentTerm');
            const hasteComm = getFieldValue('hasteCommision');
            const deliveryCharge = getFieldValue('deliveryCharge');
            const totalTax = getFieldValue('totalTaxAmount');
            const insurance = getFieldValue('insuranceIf');
            const totalAmountVal = getFieldValue('totalAmountFinal');

            const products = getProductRowsData();

            // product rows html
            let productRowsHtml = '';
            products.forEach(prod => {
                productRowsHtml += `<tr>
                <td>${escapeHtml(prod.sr)}</td>
                <td>${escapeHtml(prod.description)}</td>
                <td>${escapeHtml(prod.hsn)}</td>
                <td>${escapeHtml(prod.uom)}</td>
                <td>${escapeHtml(prod.qty)}</td>
                <td>${escapeHtml(prod.rate)}</td>
                <td>${escapeHtml(prod.amount)}</td>
                <td>${escapeHtml(prod.igst)}</td>
                <td>${escapeHtml(prod.cgst)}</td>
                <td>${escapeHtml(prod.sgst)}</td>
                <td>${escapeHtml(prod.final)}</td>
            </tr>`;
            });
            if (products.length === 0) {
                productRowsHtml = `<tr><td colspan="11" style="text-align:center;">No product entries</td></tr>`;
            }

            // final print layout following clean invoice style + header
            return `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Invoice_${invoice.no || 'print'}</title>
        <style>
            * { margin:0; padding:0; box-sizing:border-box; }
            body {
                font-family: 'Helvetica', 'Arial', sans-serif;
                font-size: 12px;
                padding: 12mm 10mm;
                background: white;
                color: #111;
            }
            @page { size: A4; margin: 12mm; }
            .invoice-container { max-width: 100%; margin: 0 auto; }
            .header { text-align: center; margin-bottom: 16px; }
            .company-name { font-size: 22px; font-weight: 800; margin: 4px 0; }
            .title-bill { text-align: center; font-weight: bold; font-size: 16px; background: #eef2ff; padding: 6px; margin: 10px 0; text-transform: uppercase; }
            table { width: 100%; border-collapse: collapse; margin: 6px 0; }
            th, td { border: 1px solid #222; padding: 6px 5px; vertical-align: top; }
            th { background: #f3f4f6; font-weight: 700; text-align: left; }
            .section-title { font-weight: 800; background: #e5e7eb; padding: 5px; margin-top: 8px; }
            .footer-table td { height: auto; }
            .amount-words { font-weight: 500; margin: 4px 0; }
            .inline-details { margin-bottom: 2px; line-height: 1.4; }
            .sign-stamp { margin-top: 20px; }
        </style>
        </head>
        <body>
        <div class="invoice-container">
            <div class="header">
                <div class="company-name">SOURCESES OVERSEAS PVT. LTD.</div>
                <div>401, Crown Complex, Ring Road, Surat - 395002 | Email: info@sourceses.com | Contact: +91 98765 43210</div>
                <div class="title-bill">TAX INVOICE / BILL OF SUPPLY</div>
            </div>
            
            <!-- three details row -->
            <table>
                <tr><th width="33%">SHIPPING DETAILS</th><th width="33%">BILLING DETAILS</th><th width="34%">INVOICE DETAILS</th></tr>
                <tr>
                    <td>NAME: ${escapeHtml(shipping.name)}<br>ADDRESS: ${escapeHtml(shipping.address)}<br>GSTIN: ${escapeHtml(shipping.gstin)}<br>STATE: ${escapeHtml(shipping.state)}<br>CODE: ${escapeHtml(shipping.code)}</td>
                    <td>NAME: ${escapeHtml(billing.name)}<br>ADDRESS: ${escapeHtml(billing.address)}<br>GSTIN: ${escapeHtml(billing.gstin)}<br>STATE: ${escapeHtml(billing.state)}<br>CODE: ${escapeHtml(billing.code)}</td>
                    <td>INVOICE NO: ${escapeHtml(invoice.no)}<br>INVOICE DATE: ${escapeHtml(invoice.date)}<br>STATE: ${escapeHtml(invoice.state)}<br>STATE CODE: ${escapeHtml(invoice.stateCode)}<br>HASTE: ${escapeHtml(invoice.haste)}<br>CONTACT: ${escapeHtml(invoice.hasteContact)}</td>
                </tr>
            </table>
            
            <!-- products table -->
            <table>
                <thead><tr>
                    <th>Sr No.</th><th>Product Description</th><th>HSN Code</th><th>Unit</th><th>Qty</th><th>Rate</th>
                    <th>Amount</th><th>IGST</th><th>CGST</th><th>SGST</th><th>Final</th>
                </tr></thead>
                <tbody>${productRowsHtml}</tbody>
            </table>
            
            <!-- Amount in words + payment term and summary side-by-side -->
            <table style="margin-top:6px;">
                <tr>
                    <td width="65%" style="vertical-align:top;">
                        <strong>AMOUNT IN WORDS:</strong><br>${escapeHtml(amountWords) || '__________________________'}<br><br>
                        <strong>PAYMENT TERM:</strong><br>${escapeHtml(paymentTerm) || '_____________'}
                    </td>
                    <td width="35%" style="vertical-align:top;">
                        <strong>HASTE (COMMISSION):</strong> ${escapeHtml(hasteComm)}<br>
                        <strong>DELIVERY CHARGE:</strong> ${escapeHtml(deliveryCharge)}<br>
                        <strong>TOTAL TAX AMOUNT:</strong> ${escapeHtml(totalTax)}<br>
                        <strong>INSURANCE (IF):</strong> ${escapeHtml(insurance)}<br>
                        <strong>TOTAL AMOUNT:</strong> ${escapeHtml(totalAmountVal)}
                    </td>
                </tr>
            </table>
            
            <!-- Transport + Bank + Terms -->
            <table>
                <tr><th>TRANSPORT DETAILS</th><th>BANK DETAILS</th><th>TERMS & CONDITIONS</th></tr>
                <tr>
                    <td>NAME: ${escapeHtml(transport.name)}<br>LORRY NO: ${escapeHtml(transport.lorryNo)}<br>CONTACT NO: ${escapeHtml(transport.contact)}<br>COMPANY: ${escapeHtml(transport.company)}</td>
                    <td>NAME: ${escapeHtml(bank.name)}<br>ACC NO.: ${escapeHtml(bank.accNo)}<br>IFSC CODE: ${escapeHtml(bank.ifsc)}<br>BRANCH: ${escapeHtml(bank.branch)}</td>
                    <td>Subjected to Surat jurisdiction<br><br><br>Sign & Stamp</td>
                </tr>
            </table>
            <div style="margin-top: 12px; font-size: 10px; text-align: center;">This is a system generated invoice</div>
        </div>
        </body>
        </html>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        function handlePrint() {
            const printHtml = buildPrintHTML();
            const printWindow = window.open('', '_blank', 'width=1000,height=800,toolbar=yes,scrollbars=yes');
            if (!printWindow) {
                alert('Please allow pop-ups to generate PDF preview');
                return;
            }
            printWindow.document.write(printHtml);
            printWindow.document.close();
            printWindow.focus();
            printWindow.print();
        }

        document.getElementById('printBtn')?.addEventListener('click', handlePrint);

        // set title from props concept
        const titleSpan = document.querySelector('.border-b.text-center');
        if (titleSpan) titleSpan.innerText = 'TAX INVOICE / BILL OF SUPPLY';
    </script>
</body>

</html>
